{% extends "base.html" %}

{% block title %}Edit Appointment - Appointment System{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row mb-4">
        <div class="col-md-8">
            <h2>Edit Appointment</h2>
        </div>
    </div>

    <div class="row">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">Update Appointment Information</div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label for="doctor_id" class="form-label">Select Doctor *</label>
                            <select class="form-control" id="doctor_id" name="doctor_id" required>
                                {% for doctor in doctors %}
                                <option value="{{ doctor.id }}" {% if doctor.id == appointment.doctor_id %}selected{% endif %}>{{ doctor.name }} - {{ doctor.specialization }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="patient_id" class="form-label">Select Patient *</label>
                            <select class="form-control" id="patient_id" name="patient_id" required>
                                {% for patient in patients %}
                                <option value="{{ patient.id }}" {% if patient.id == appointment.patient_id %}selected{% endif %}>{{ patient.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="appointment_date" class="form-label">Appointment Date *</label>
                                <input type="date" class="form-control" id="appointment_date" name="appointment_date" value="{{ appointment.appointment_date.strftime('%Y-%m-%d') }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="appointment_time" class="form-label">Appointment Time *</label>
                                <input type="time" class="form-control" id="appointment_time" name="appointment_time" value="{{ appointment.appointment_date.strftime('%H:%M') }}" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="reason_for_visit" class="form-label">Reason for Visit *</label>
                            <textarea class="form-control" id="reason_for_visit" name="reason_for_visit" rows="3" required>{{ appointment.reason_for_visit }}</textarea>
                        </div>
                        <div class="mb-3">
                            <label for="status" class="form-label">Status *</label>
                            <select class="form-control" id="status" name="status" required>
                                <option value="scheduled" {% if appointment.status == 'scheduled' %}selected{% endif %}>Scheduled</option>
                                <option value="completed" {% if appointment.status == 'completed' %}selected{% endif %}>Completed</option>
                                <option value="cancelled" {% if appointment.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="notes" class="form-label">Notes</label>
                            <textarea class="form-control" id="notes" name="notes" rows="3">{{ appointment.notes or '' }}</textarea>
                        </div>
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="/appointments/{{ appointment.id }}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Update Appointment</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
