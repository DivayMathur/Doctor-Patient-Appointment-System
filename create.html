{% extends "base.html" %}

{% block title %}Create Doctor - Appointment System{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row mb-4">
        <div class="col-md-8">
            <h2>Add New Doctor</h2>
        </div>
    </div>

    <div class="row">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">Doctor Information</div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label for="name" class="form-label">Full Name *</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email *</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="phone" class="form-label">Phone Number *</label>
                            <input type="tel" class="form-control" id="phone" name="phone" required>
                        </div>
                        <div class="mb-3">
                            <label for="specialization" class="form-label">Specialization *</label>
                            <select class="form-control" id="specialization" name="specialization" required>
                                <option value="">Select Specialization</option>
                                <option value="Cardiology">Cardiology</option>
                                <option value="Neurology">Neurology</option>
                                <option value="Orthopedics">Orthopedics</option>
                                <option value="Dermatology">Dermatology</option>
                                <option value="Pediatrics">Pediatrics</option>
                                <option value="General Practice">General Practice</option>
                                <option value="Psychiatry">Psychiatry</option>
                                <option value="Surgery">Surgery</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="experience_years" class="form-label">Years of Experience *</label>
                            <input type="number" class="form-control" id="experience_years" name="experience_years" min="0" required>
                        </div>
                        <div class="mb-3">
                            <label for="clinic_address" class="form-label">Clinic Address *</label>
                            <textarea class="form-control" id="clinic_address" name="clinic_address" rows="3" required></textarea>
                        </div>
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="/doctors/" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Create Doctor</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
